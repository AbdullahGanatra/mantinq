<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - MaintainIQ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-brand">
                <i class="fas fa-qrcode"></i>
                <span>MaintainIQ</span>
            </a>
            <button class="sidebar-close d-lg-none" id="sidebarClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="assets.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Assets</span>
            </a>
            <a href="maintenance.html" class="nav-item">
                <i class="fas fa-tools"></i>
                <span>Maintenance</span>
            </a>
            <a href="history.html" class="nav-item active">
                <i class="fas fa-history"></i>
                <span>History</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn btn-outline-danger w-100 rounded-pill" id="resetDataBtn">
                <i class="fas fa-redo me-2"></i>Reset Demo Data
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <button class="sidebar-toggle d-lg-none" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="topbar-title">
                <h4 class="mb-0 fw-bold">Activity History</h4>
                <small class="text-muted">Complete timeline of all activities</small>
            </div>
        </header>

        <!-- History Content -->
        <div class="dashboard-content">
            <!-- Filters -->
            <div class="dashboard-card mb-4">
                <div class="card-body-custom">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label text-muted small fw-semibold">Search History</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-search text-muted"></i></span>
                                <input type="text" class="form-control border-start-0 bg-light" id="searchHistory" placeholder="Search activities...">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-muted small fw-semibold">Activity Type</label>
                            <select class="form-select bg-light" id="filterActivityType">
                                <option value="">All Activities</option>
                                <option value="Asset Created">Asset Created</option>
                                <option value="QR Generated">QR Generated</option>
                                <option value="Issue Reported">Issue Reported</option>
                                <option value="Status Changed">Status Changed</option>
                                <option value="Maintenance Added">Maintenance Added</option>
                                <option value="Issue Resolved">Issue Resolved</option>
                                <option value="Asset Updated">Asset Updated</option>
                                <option value="Asset Deleted">Asset Deleted</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-muted small fw-semibold">Asset</label>
                            <select class="form-select bg-light" id="filterHistoryAsset">
                                <option value="">All Assets</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100 rounded-pill" id="clearHistoryFilters">
                                <i class="fas fa-times me-1"></i>Clear
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Timeline -->
            <div class="dashboard-card">
                <div class="card-header-custom d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-stream me-2 text-info"></i>Activity Timeline</h5>
                    <span class="badge bg-info rounded-pill" id="historyCountBadge">0 Activities</span>
                </div>
                <div class="card-body-custom">
                    <div class="timeline" id="historyTimeline">
                        <!-- Populated by JS -->
                    </div>
                    <div id="noHistoryMessage" class="text-center py-5 d-none">
                        <i class="fas fa-history fa-3x text-muted mb-3"></i>
                        <h5 class="text-muted">No activities found</h5>
                        <p class="text-muted">Start using MaintainIQ to see your activity history</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
